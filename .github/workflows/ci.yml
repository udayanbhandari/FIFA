name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Format (ruff)
        run: ruff format --check .
      - name: Type check (mypy + Pydantic plugin)
        run: mypy app/
      - name: Tests (pytest, coverage ≥90%)
        run: python -m pytest --cov=app --cov-report=term-missing --cov-fail-under=90
        env:
          USE_GEMINI: "false"
          USE_FIRESTORE: "false"

  frontend:
    name: Frontend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Type check (tsc)
        run: npm run typecheck
      - name: Lint (ESLint + jsx-a11y accessibility rules)
        run: npm run lint
      - name: Format (Prettier)
        run: npm run format:check
      - name: Tests (Vitest, coverage ≥90%)
        run: npm test -- --coverage
      - name: Build
        run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: '3.12'
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      - name: Install backend
        run: pip install -r backend/requirements.txt
      - name: Install frontend
        run: cd frontend && npm ci
      - name: Install Playwright
        run: cd frontend && npx playwright install --with-deps chromium
      - name: Start backend
        run: uvicorn app.main:app --port 8000 &
        working-directory: backend
        env:
          USE_GEMINI: "false"
          USE_FIRESTORE: "false"
      - name: Run E2E tests
        run: cd frontend && npx playwright test
        env:
          VITE_API_URL: http://localhost:8000

  api-drift:
    name: API Contract Drift
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: '3.12'
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      - run: pip install -r backend/requirements.txt
      - run: cd frontend && npm ci
      - name: Check API type drift
        run: cd frontend && bash scripts/sync-types.sh --check
        env:
          USE_GEMINI: "false"
          USE_FIRESTORE: "false"
